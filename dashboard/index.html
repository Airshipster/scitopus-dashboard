      event.preventDefault();
      state.holdUntil = 0;
      if (state.mode !== "rain") state.logMinSmooth = {};
      const direction = event.deltaY || event.deltaX || 0;
      const magnitude = Math.max(1, Math.min(8, Math.ceil(Math.abs(direction) / 80)));
      const next = (state.playhead || state.index) + Math.sign(direction || 1) * magnitude;
      setPosition(next);
      render(false);
    }, { passive: false });
    const dashboardParams = new URLSearchParams(window.location.search);
    const dashboardThemeParam = dashboardParams.get("theme");
    applyTheme(dashboardThemeParam === "day" ? "day" : dashboardThemeParam === "night" ? "night" : (localStorage.getItem("dashboardTheme") || "night"));
    if (dashboardParams.get("embedded") === "1") {
      document.body.classList.add("embedded-host");

      const postEmbeddedHeight = () => {
        window.parent?.postMessage(
          {
            type: "scitopus-overview-height",
            height: Math.ceil(Math.max(
              document.documentElement.scrollHeight,
              document.body.scrollHeight,
            )),
          },
          window.location.origin,
        );
      };

      window.addEventListener("load", postEmbeddedHeight);
      window.addEventListener("resize", postEmbeddedHeight);
      window.addEventListener("message", event => {
        if (event.origin !== window.location.origin) return;
        if (event.data?.type !== "scitopus-overview-theme") return;
        applyTheme(event.data.theme === "day" ? "day" : "night");
        postEmbeddedHeight();
      });
      if ("ResizeObserver" in window) {
        const embeddedResizeObserver = new ResizeObserver(postEmbeddedHeight);
        embeddedResizeObserver.observe(document.documentElement);
      }
      setTimeout(postEmbeddedHeight, 250);
      setTimeout(postEmbeddedHeight, 1000);
      setTimeout(postEmbeddedHeight, 2500);
    }
    refreshOptions();
    setPlaying(true);
  </script>
</body>
</html>
